<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Alghajar | Digital Space</title>
    <style>
        /* Unique Color Palette: Midnight & Neon */
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-cyan: #22d3ee;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.7;
        }

        /* Glassmorphism Navigation */
        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.2rem;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-cyan);
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            text-align: center;
        }

        header h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout Sections */
        section {
            padding: 100px 5%;
            max-width: 1100px;
            margin: auto;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h2::after {
            content: "";
            height: 1px;
            flex-grow: 1;
            background: rgba(34, 211, 238, 0.3);
        }

        /* Visual Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .img-card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; /* Change cursor to pointer for clickable effect */
        }

        .img-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .img-card:hover img {
            transform: scale(1.05);
        }

        /* Video Styling */
        .video-wrapper {
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--accent-cyan);
        }

        /* Contact Form */
        form {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            display: grid;
            gap: 20px;
        }

        input, textarea {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            color: white;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-cyan);
        }

        button {
            background: var(--accent-cyan);
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent-cyan);
            transform: translateY(-2px);
        }

        footer {
            padding: 50px;
            text-align: center;
            border-top: 1px solid #334155;
            color: var(--text-dim);
        }

        /* ==========================================
           LIGHTBOX / MODAL STYLES
           ========================================== */
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .lightbox-modal.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 85%;
            max-height: 80%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            object-fit: contain;
            animation: fadeIn 0.3s ease-in-out;
        }

        .lightbox-caption {
            margin-top: 15px;
            font-size: 1.1rem;
            color: var(--text-main);
            letter-spacing: 1px;
            text-align: center;
        }

        .lightbox-counter {
            color: var(--accent-cyan);
            font-size: 0.85rem;
            margin-top: 5px;
            font-family: monospace;
        }

        /* Lightbox Control Buttons */
        .lightbox-btn {
            position: absolute;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 2rem;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            z-index: 2100;
        }

        .lightbox-btn:hover {
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
            background: var(--card-bg);
        }

        .lightbox-close {
            top: -60px;
            right: 0;
            font-size: 1.5rem;
            padding: 5px 15px;
        }

        .lightbox-prev {
            left: -80px;
            top: 50%;
            transform: translateY(-50%);
        }

        .lightbox-next {
            right: -80px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Responsive UI for Mobile Lightbox Controls */
        @media (max-width: 768px) {
            .lightbox-prev { left: 10px; top: auto; bottom: -70px; transform: none; }
            .lightbox-next { right: 10px; top: auto; bottom: -70px; transform: none; }
            .lightbox-close { top: -50px; right: 10px; }
            .lightbox-content { max-width: 95%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#work">Work</a>
        <a href="#video">Vibe</a>
        <a href="#contact">Connect</a>
    </nav>

    <header id="home">
        <h1>Salem Alghajar</h1>
        <p style="color: var(--accent-cyan); letter-spacing: 5px;">DEVELOPER // DESIGNER // STUDENT</p>
    </header>

    <section id="work">
        <h2>Visual Portfolio</h2>
        <div class="image-grid">
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=800&q=80" alt="Cyber Network">
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80" alt="Retro Tech">
            </div>
            <div class="img-card">
                <img src="https://images.unsplash.com/photo-1587620962725-abab7fe55159?auto=format&fit=crop&w=800&q=80" alt="Clean Code">
            </div>
        </div>
    </section>

    <section id="video">
        <h2>Cinematic Inspiration</h2>
        <div class="video-wrapper">
            <div style="position:relative; padding-bottom:56.25%;">
                <iframe 
                    style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                    src="https://www.youtube.com/embed/vPhN_7SgXmI?autoplay=1&mute=1&loop=1&playlist=vPhN_7SgXmI" 
                    title="Atmospheric Cinematic Video" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </section>

    <section id="contact">
        <h2>Start a Project</h2>
        <form action="#">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Digital Address (Email)" required>
            <textarea rows="6" placeholder="What's on your mind?"></textarea>
            <button type="submit">TRANSMIT MESSAGE</button>
        </form>
    </section>

    <footer>
        <p>Designed by Salem Alghajar &copy; 2026</p>
        <p style="font-size: 0.7rem; margin-top: 10px;">EST. 2026 | BUILT FOR THE FUTURE</p>
    </footer>

    <div class="lightbox-modal" id="lightboxModal">
        <div class="lightbox-content">
            <button class="lightbox-btn lightbox-close" id="closeBtn">&times;</button>
            <button class="lightbox-btn lightbox-prev" id="prevBtn">&#10094;</button>
            <button class="lightbox-btn lightbox-next" id="nextBtn">&#10095;</button>
            
            <img class="lightbox-img" id="lightboxTargetImg" src="" alt="">
            <div class="lightbox-caption" id="lightboxCaption"></div>
            <div class="lightbox-counter" id="lightboxCounter"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Select elements
            const galleryImages = document.querySelectorAll('.image-grid .img-card img');
            const lightbox = document.getElementById('lightboxModal');
            const lightboxImg = document.getElementById('lightboxTargetImg');
            const captionText = document.getElementById('lightboxCaption');
            const counterText = document.getElementById('lightboxCounter');
            
            const closeBtn = document.getElementById('closeBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            let currentIndex = 0;

            // Open Lightbox
            function openLightbox(index) {
                currentIndex = index;
                updateLightboxContent();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden'; // Stop background scrolling
            }

            // Close Lightbox
            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = ''; // Restore scrolling
            }

            // Update image source, caption and data array index positioning
            function updateLightboxContent() {
                const currentImg = galleryImages[currentIndex];
                lightboxImg.src = currentImg.src;
                lightboxImg.alt = currentImg.alt;
                captionText.textContent = currentImg.alt || "Portfolio Image";
                counterText.textContent = `${currentIndex + 1} / ${galleryImages.length}`;
            }

            // Next Slide Controls
            function nextSlide() {
                currentIndex = (currentIndex + 1) % galleryImages.length;
                updateLightboxContent();
            }

            // Previous Slide Controls
            function prevSlide() {
                currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
                updateLightboxContent();
            }

            // Attach event listeners to initial portfolio image list grid
            galleryImages.forEach((img, index) => {
                img.closest('.img-card').addEventListener('click', () => {
                    openLightbox(index);
                });
            });

            // Action UI Button Triggers
            nextBtn.addEventListener('click', (e) => { e.stopPropagation(); nextSlide(); });
            prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prevSlide(); });
            closeBtn.addEventListener('click', closeLightbox);
            
            // Close when clicking empty area space outside image canvas bounds
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            // Accessibility Keyboard Shortcut Mappings
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
            });
        });
    </script>

</body>
</html>
